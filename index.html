<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Treino ABC - Progresso</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b0f14" id="metaTheme" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu-overlay" id="menuOverlay"></div>
<nav class="side-menu" id="sideMenu">
  <div class="menu-hd">
    <span>Opções</span>
    <button class="ghost" id="btnCloseMenu">✕</button>
  </div>
  <div class="menu-bd">
    <button class="menu-item" id="btnEditWorkouts">⚙️ Editar Treinos</button>
    <button class="menu-item" id="btnExport">📤 Exportar Backup</button>
    <button class="menu-item" id="btnImport">📥 Importar Backup</button>
    <div class="sep"></div>
    <button class="menu-item" id="btnToggleThemeMenu">🌓 Alternar Tema</button>
    <div class="sep"></div>
    <button class="menu-item danger" id="btnResetAll" style="color: var(--bad);">⚠️ Zerar Tudo (Reset)</button>
  </div>
</nav>

<div class="wrap">
  <header>
    <div class="toprow">
      <div>
        <h1>Meu Treino — Progresso</h1>
        <div class="muted" id="todayLine"></div>
      </div>
      <button class="ghost" id="btnOpenMenu" style="font-size: 24px; padding: 4px 8px;">☰</button>
    </div>

    <div class="tabs" id="tabsContainer"></div>
    
    <div class="row" style="margin-top: 10px;">
        <button id="btnMarkTrain" class="good">Marcar “treino feito”</button>
        <button id="btnMarkRest" class="ghost">Marcar “descanso”</button>
        <button id="btnClearToday" class="danger">Limpar hoje</button>
    </div>
  </header>

  <div class="grid">
    <section class="card" id="workoutCard">
      <div class="hd">
        <div>
          <div style="font-weight:900" id="workoutTitle">Carregando...</div>
          <div class="muted" id="workoutSubtitle"></div>
        </div>
      </div>
      <div class="bd">
        <div class="kpi">
          <div class="box"><div class="v" id="kpiSets">0</div><div class="t">Séries hoje</div></div>
          <div class="box"><div class="v" id="kpiVolume">0</div><div class="t">Volume (kg)</div></div>
          <div class="box"><div class="v" id="kpiDone">0%</div><div class="t">Progresso</div></div>
        </div>
        <div class="sep"></div>
        <div class="row" style="justify-content:space-between; align-items:center;">
          <div class="hint">Dica: registre <b>carga</b> e <b>séries</b>.</div>
          <select id="restPreset" style="width: auto; padding: 6px 10px;">
            <option value="60">60s</option>
            <option value="90" selected>90s</option>
            <option value="120">120s</option>
          </select>
        </div>
        <div class="sep"></div>
        <div id="exerciseList"></div>
      </div>
    </section>

    <aside class="card">
      <div class="hd"><div style="font-weight:900">Acompanhamento</div></div>
      <div class="bd">
        <div class="exercise">
          <div class="ex-name">Peso corporal</div>
          <div class="fields">
            <div class="field"><label>Peso (kg)</label><input id="bwValue" inputmode="decimal" placeholder="ex: 85" /></div>
            <div class="field"><label>Ação</label><button id="btnSaveBW" class="primary">Salvar</button></div>
          </div>
          <div class="muted" id="bwLast"></div>
        </div>
        <div class="exercise">
          <div class="ex-name">Calendário (30 dias)</div>
          <div class="calendar" id="calendar"></div>
        </div>
        <div class="exercise">
          <div class="ex-name">Gráfico de carga</div>
          <select id="chartExercise" style="margin-bottom: 10px;"></select>
          <div class="chart-container">
            <canvas id="chart"></canvas>
          </div>
          <div class="muted small" id="chartHint"></div>
        </div>
        <div id="history"></div>
      </div>
    </aside>
  </div>
</div>

<div class="footerbar">
  <div class="wrap footer-content">
    <div class="row no-wrap">
      <span class="pill" id="restState">Descanso: parado</span>
      <span class="pill" id="restTimer">00:00</span>
    </div>
    <button id="btnRest" class="primary">Iniciar descanso</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="modalConfig">
  <div class="modal-box">
    <div class="modal-hd">
      <div style="display:flex; flex-direction:column;">
        <span style="font-size: 18px;">Configurações</span>
        <span class="muted" style="font-size: 12px;">Gerencie seus treinos</span>
      </div>
      <button class="ghost" id="btnCloseConfig" style="font-size: 20px;">✕</button>
    </div>
    <div class="modal-bd" id="configBody"></div>
    <div class="modal-ft">
      <button class="ghost" onclick="window._addWk()" style="border-color: var(--accent2); color: var(--accent2);">+ Novo Treino</button>
      <button class="primary" id="btnSaveConfig">Salvar Tudo</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
